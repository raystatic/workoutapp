name: Main CI/CD

# The full pipeline. Runs ONLY on merges/pushes to main.
# Stages: unit tests -> instrumentation tests (Android emulator + Firebase Local
# Emulator Suite) -> build. Each stage gates the next.
on:
  push:
    branches:
      - main
  # Manual trigger: lets us validate the full pipeline on demand — needed
  # because PRs auto-merged via GITHUB_TOKEN don't fire the push trigger.
  workflow_dispatch: {}

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Check for Gradle wrapper
        id: gradle_check
        run: |
          if [ -f ./gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - name: Run unit tests
        if: steps.gradle_check.outputs.exists == 'true'
        run: ./gradlew testDebugUnitTest allTests --continue --stacktrace

  instrumentation-tests:
    name: Instrumentation Tests (Firebase Emulator)
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4
      # firebase-tools requires a Java 21+ runtime for the emulators, so this
      # job runs on JDK 21. The project's Kotlin/Android compile toolchain stays
      # pinned at 17 (via jvmToolchain + foojay auto-provisioning); Gradle 8.9
      # and AGP 8.7 run fine on JDK 21.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Check for Gradle wrapper
        id: gradle_check
        run: |
          if [ -f ./gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      # Hardware acceleration for the Android emulator.
      - name: Enable KVM
        if: steps.gradle_check.outputs.exists == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Boots an Android emulator, starts the Firebase Local Emulator Suite
      # (Auth + Firestore + Storage), and runs the instrumentation tests against
      # both. firebase emulators:exec starts the emulators, runs the command,
      # then tears them down. Tests point at the emulators via
      # 10.0.2.2:<port> (the host loopback as seen from the Android emulator).
      - name: Run instrumentation tests against Firebase emulators
        if: steps.gradle_check.outputs.exists == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: firebase emulators:exec --only auth,firestore,storage "./gradlew connectedDebugAndroidTest --stacktrace"

      - name: Upload instrumentation reports
        if: always() && steps.gradle_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-reports
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          if-no-files-found: ignore

  build:
    name: Build
    needs: instrumentation-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Check for Gradle wrapper
        id: gradle_check
        run: |
          if [ -f ./gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - name: Assemble debug artifacts
        if: steps.gradle_check.outputs.exists == 'true'
        run: ./gradlew assembleDebug --stacktrace

  distribute-android:
    name: Distribute Android (Firebase App Distribution)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check for Gradle wrapper
        id: gradle_check
        run: |
          if [ -f ./gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      - name: Assemble debug APK
        if: steps.gradle_check.outputs.exists == 'true'
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Locate debug APK
        id: apk
        if: steps.gradle_check.outputs.exists == 'true'
        run: |
          APK=$(find androidApp/build/outputs/apk/debug -name "*.apk" | head -n1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "::notice::Debug APK: $APK"

      # Always publish the APK as a workflow artifact so it can be downloaded
      # from the Actions run even before Firebase App Distribution is configured.
      - name: Upload debug APK artifact
        if: steps.gradle_check.outputs.exists == 'true' && steps.apk.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: warn

      # Skip the Firebase upload gracefully until the two secrets are set.
      - name: Check Firebase App Distribution secrets
        id: fb
        env:
          APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          SVC: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$SVC" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Firebase App Distribution secrets not set — skipping upload. The APK is still available as the 'app-debug-apk' artifact. See docs/APP_DISTRIBUTION.md."
          fi

      - name: Distribute to Firebase App Distribution
        if: steps.gradle_check.outputs.exists == 'true' && steps.fb.outputs.ready == 'true' && steps.apk.outputs.path != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          releaseNotes: ${{ github.event.head_commit.message }}
          file: ${{ steps.apk.outputs.path }}
